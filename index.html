<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trammit DISC · Análise Comportamental</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────────
   TRAMMIT DISC — Design System v2
   Paleta: #0F1115 (base) · #1E2027 (surface)
           #6B5CFF (primary) · #3F4499 (dark)
           #FFFFFF (text) · lilás apenas apoio
───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#0F1115;color:#FFFFFF;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:rgba(107,92,255,.28);border-radius:3px;}
::selection{background:rgba(107,92,255,.45);color:#fff;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}

.page{min-height:100vh;display:flex;flex-direction:column;}
.anim-up{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both;}
.anim-up-1{animation-delay:.07s;}.anim-up-2{animation-delay:.14s;}
.anim-up-3{animation-delay:.21s;}.anim-up-4{animation-delay:.28s;}.anim-up-5{animation-delay:.35s;}

/* ── CANVAS: fundo principal landing/admin ──
   Base quase-preto com glow roxo sutil apenas
   no topo — sem "lavado", com profundidade real.  */
.canvas{
  background:#0F1115;
  background-image:
    radial-gradient(ellipse 900px 560px at 65% -5%, rgba(63,52,153,.38) 0%, transparent 52%),
    radial-gradient(ellipse 520px 420px at -8% 92%, rgba(40,32,110,.22) 0%, transparent 50%);
}

/* ── NAVBAR ─────────────────────────────── */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:66px;
  border-bottom:1px solid rgba(255,255,255,.07);
  position:sticky;top:0;z-index:50;
  background:rgba(15,17,21,.93);
  backdrop-filter:blur(24px) saturate(1.4);
}
/* Navbar sobre fundo claro (quiz / result) */
.nav-light{
  background:rgba(255,255,255,.97);
  border-bottom:1px solid rgba(107,92,255,.12);
  backdrop-filter:none;
}

/* LOGO — sem nenhuma caixa.
   Logo branca (PNG negativo): usar sobre fundo escuro sem filtro.
   Sobre fundo claro: inverter via CSS para ficar escura/marca. */
.logo-img{
  height:28px;object-fit:contain;display:block;
  /* PNG negativo (branco) → mantém como está em fundo escuro */
}
.logo-img-dark{
  height:26px;object-fit:contain;display:block;
  /* Sobre fundo claro: transforma branco em roxo-escuro da marca */
  filter:brightness(0) saturate(100%) invert(24%) sepia(60%) saturate(800%) hue-rotate(220deg) brightness(0.8);
}

/* ── PILLS ───────────────────────────────── */
.pill{
  display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:100px;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
}
.pill-purple{
  background:rgba(107,92,255,.13);
  color:rgba(200,193,255,.88);
  border:1px solid rgba(107,92,255,.28);
}
.pill-light{background:rgba(107,92,255,.08);color:#5B4EE8;border:1px solid rgba(107,92,255,.22);}

/* ── BUTTONS ─────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:11px;cursor:pointer;
  font-family:'Inter',sans-serif;font-weight:600;font-size:14px;
  letter-spacing:.01em;transition:all .17s ease;
  padding:13px 26px;line-height:1;white-space:nowrap;text-decoration:none;
}
.btn:disabled{opacity:.28;cursor:not-allowed;pointer-events:none;}

/* CTA principal — contraste máximo, sólido */
.btn-primary{
  background:#6B5CFF;color:#FFFFFF;
  box-shadow:0 2px 16px rgba(107,92,255,.32);
}
.btn-primary:hover:not(:disabled){
  background:#5B4EE8;
  box-shadow:0 5px 24px rgba(107,92,255,.44);
  transform:translateY(-1px);
}

/* Outline — fundo claro */
.btn-outline{background:transparent;color:#5B4EE8;border:1.5px solid rgba(91,78,232,.38);}
.btn-outline:hover:not(:disabled){background:rgba(107,92,255,.07);border-color:#6B5CFF;color:#6B5CFF;}

/* Soft — navbar escura */
.btn-soft{
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.12);
}
.btn-soft:hover:not(:disabled){background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.20);}

/* Ghost escuro */
.btn-ghost{background:transparent;color:rgba(255,255,255,.52);border:1px solid rgba(255,255,255,.12);}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.06);color:rgba(255,255,255,.82);}

/* Ghost claro (quiz) */
.btn-ghost-dk{background:transparent;color:#58546E;border:1.5px solid rgba(107,92,255,.20);}
.btn-ghost-dk:hover:not(:disabled){background:rgba(107,92,255,.06);color:#3F4499;}

.btn-lg{padding:16px 34px;font-size:15px;border-radius:12px;}
.btn-sm{padding:9px 18px;font-size:13px;border-radius:9px;}
.btn-full{width:100%;}

/* ── CARDS ───────────────────────────────── */

/* card-dark: formulário landing.
   Fundo escuro sólido, borda visível, sem glassmorphism lavado. */
.card-dark{
  background:#1A1822;
  border:1px solid rgba(107,92,255,.32);
  border-radius:18px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,.40) inset,
    0 12px 52px rgba(0,0,0,.52);
}

/* card-rich: admin, painéis */
.card-rich{background:#1E2027;border:1px solid rgba(107,92,255,.16);border-radius:18px;}

/* card-light: seções sobre fundo claro (quiz, result) */
.card-light{
  background:#FFFFFF;
  border:1px solid rgba(107,92,255,.10);
  border-radius:16px;
  box-shadow:0 2px 14px rgba(107,92,255,.06);
}
.card-surface{background:#F6F5FF;border:1px solid rgba(107,92,255,.10);border-radius:14px;}

/* ── FORMULÁRIO ──────────────────────────── */
.input-wrap{display:flex;flex-direction:column;gap:8px;}

/* Label no card escuro — bem legível */
.label-dk{
  font-size:10.5px;font-weight:700;
  font-family:'Inter',sans-serif;
  color:rgba(200,193,255,.70);
  text-transform:uppercase;letter-spacing:.09em;
}
.label-lt{font-size:10.5px;font-weight:700;font-family:'Inter',sans-serif;color:#8785A2;text-transform:uppercase;letter-spacing:.09em;}

/* Input no card escuro — contraste real */
.input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.18);
  border-radius:11px;outline:none;
  font-family:'Inter',sans-serif;font-size:15px;color:#FFFFFF;
  transition:border-color .15s,box-shadow .15s,background .15s;
}
.input::placeholder{color:rgba(255,255,255,.30);}
.input:focus{
  border-color:#7B6FFF;
  background:rgba(107,92,255,.10);
  box-shadow:0 0 0 3px rgba(107,92,255,.20);
}

/* Input claro (modais admin) */
.input-lt{background:#fff;border:1.5px solid rgba(107,92,255,.22);color:#1E1B2E;}
.input-lt::placeholder{color:#ABA8C4;}
.input-lt:focus{border-color:#6B5CFF;background:#fff;box-shadow:0 0 0 3px rgba(107,92,255,.13);}

.err-msg{font-size:12px;color:#F87171;font-weight:500;}

/* ── PROGRESS ────────────────────────────── */
.prog-rail{height:3px;background:rgba(255,255,255,.10);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:#6B5CFF;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-fill-solid{background:#6B5CFF;height:3px;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── QUIZ OPTIONS ────────────────────────── */
.opt{
  display:flex;align-items:center;gap:14px;padding:16px 20px;
  background:#FFFFFF;
  border:1.5px solid #E2DFF2;
  border-radius:13px;cursor:pointer;
  transition:border-color .14s,background .14s,transform .12s,box-shadow .14s;
  color:#1E1B2E;
}
.opt:hover{border-color:rgba(107,92,255,.50);background:#F0EEFF;transform:translateX(3px);}
.opt.sel{border-color:#6B5CFF;background:#EAE7FF;box-shadow:0 3px 18px rgba(107,92,255,.15);}
.opt-radio{width:20px;height:20px;border-radius:50%;border:2px solid #C8C4DE;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .14s;}
.opt.sel .opt-radio{background:#6B5CFF;border-color:#6B5CFF;}
.opt-dot{width:7px;height:7px;background:#fff;border-radius:50%;display:none;}
.opt.sel .opt-dot{display:block;}
.opt-text{font-size:14.5px;line-height:1.60;color:#26233E;flex:1;}
.opt.sel .opt-text{color:#1A1535;font-weight:500;}

/* ── SCORE BARS ──────────────────────────── */
.score-row{display:flex;align-items:center;gap:11px;}
.score-ltr{width:30px;height:30px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:800;font-size:12.5px;color:#fff;}
.score-name{font-size:12.5px;font-weight:500;color:#706D8A;width:72px;flex-shrink:0;}
.score-track{flex:1;height:7px;background:#ECEAF5;border-radius:7px;overflow:hidden;}
.score-bar{height:100%;border-radius:7px;width:0%;transition:width 1.1s cubic-bezier(.4,0,.2,1);}
.score-pct{font-size:13px;font-weight:700;width:34px;text-align:right;color:#1A1535;}

/* ── ADMIN ───────────────────────────────── */
.admin-layout{display:flex;flex:1;min-height:0;}
.admin-side{
  width:220px;flex-shrink:0;
  background:#0A0C10;
  border-right:1px solid rgba(107,92,255,.12);
  padding:24px 0;display:flex;flex-direction:column;gap:2px;
}
.admin-nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 20px;
  cursor:pointer;font-size:13.5px;font-weight:500;
  color:rgba(255,255,255,.38);
  border-left:3px solid transparent;transition:all .15s;
}
.admin-nav-item:hover{color:rgba(255,255,255,.80);background:rgba(107,92,255,.07);}
.admin-nav-item.on{
  color:#E2DEFF;
  background:rgba(107,92,255,.12);
  border-left-color:#6B5CFF;
}
.admin-body{flex:1;overflow-y:auto;padding:36px 40px;}
.thead{
  display:grid;padding:11px 20px;
  border-bottom:1px solid rgba(255,255,255,.07);
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,.34);
}
.trow{display:grid;padding:13px 20px;align-items:center;border-bottom:1px solid rgba(255,255,255,.04);transition:background .13s;}
.trow:last-child{border-bottom:none;}
.trow:hover{background:rgba(107,92,255,.06);}
.tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;}
.tag-g{background:rgba(34,197,94,.11);color:#4ade80;border:1px solid rgba(34,197,94,.16);}
.tag-off{background:rgba(255,255,255,.04);color:rgba(255,255,255,.30);border:1px solid rgba(255,255,255,.06);}

/* ── RESULT HERO ─────────────────────────── */
.result-hero{
  background:#0F1115;
  background-image:
    radial-gradient(ellipse 700px 380px at 50% -4%, rgba(63,52,153,.36) 0%, transparent 55%),
    radial-gradient(ellipse 380px 320px at 92% 108%, rgba(40,30,120,.18) 0%, transparent 52%);
  padding:72px 24px 80px;text-align:center;position:relative;overflow:hidden;
}
.medallion{
  width:96px;height:96px;border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Poppins',sans-serif;font-weight:800;font-size:44px;color:#fff;
  margin:0 auto 22px;
  box-shadow:0 16px 44px rgba(0,0,0,.52);
}

/* ── SECTION LABELS ──────────────────────── */
.sec-lbl{
  font-family:'Inter',sans-serif;font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.10em;color:#8785A2;
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.sec-lbl::before,.sec-lbl::after{content:'';flex:1;height:1px;background:rgba(107,92,255,.10);}

/* ── MODALS ──────────────────────────────── */
.modal-bg{
  position:fixed;inset:0;z-index:200;
  background:rgba(5,4,14,.86);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .22s ease both;
}
.modal{
  background:#1A1822;
  border:1px solid rgba(107,92,255,.28);
  border-radius:20px;padding:36px;
  width:100%;max-width:540px;max-height:90vh;overflow-y:auto;
  box-shadow:0 28px 80px rgba(0,0,0,.62);
}

/* ── TOAST ───────────────────────────────── */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:#1E2027;
  border:1px solid rgba(107,92,255,.28);
  border-radius:12px;padding:12px 20px;
  display:flex;align-items:center;gap:10px;
  font-size:13.5px;font-weight:500;color:rgba(255,255,255,.90);
  box-shadow:0 8px 32px rgba(0,0,0,.52);
  animation:toastIn .28s cubic-bezier(.22,1,.36,1) both;
}

/* ── UTILITIES ───────────────────────────── */
.divider{height:1px;background:rgba(255,255,255,.06);}
.ff-h{font-family:'Poppins',sans-serif;}
/* Lilás claro — apenas para acento, nunca texto longo */
.col-lilac{color:#C9C3FF;}
.col-primary{color:#6B5CFF;}
.col-muted{color:rgba(255,255,255,.44);}

/* ── RESPONSIVE ──────────────────────────── */

/* ── PRINT / PDF ── */
@media print {
  body.printing .nav,
  body.printing [class*="share"],
  body.printing .btn,
  body.printing .pill { display:none!important; }

  @page { margin: 15mm; size: A4; }

  body { background:#fff!important; color:#1E1B2E!important; }

  .result-hero {
    background:#3F4499!important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
    padding:40px 24px!important;
  }

  .medallion {
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }

  .card-light { box-shadow:none!important; border:1px solid #DDD!important; }
  .score-bar  { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .score-ltr  { -webkit-print-color-adjust:exact; print-color-adjust:exact; }

  /* Garante que cards não quebrem entre páginas */
  .card-light { page-break-inside:avoid; }

  /* Esconde action bars no topo e bottom */
  body.printing > div > div:nth-child(2) { display:none!important; }
}
@media(max-width:768px){
  .nav{padding:0 18px;height:60px;}
  .admin-layout{flex-direction:column;}
  .admin-side{width:100%;flex-direction:row;overflow-x:auto;padding:0;border-right:none;border-bottom:1px solid rgba(107,92,255,.10);display:flex;}
  .admin-nav-item{border-left:none;border-bottom:3px solid transparent;white-space:nowrap;padding:13px 16px;}
  .admin-nav-item.on{border-bottom-color:#6B5CFF;border-left-color:transparent;}
  .admin-body{padding:22px 16px;}
  .result-hero{padding:50px 20px 60px;}
  .medallion{width:80px;height:80px;font-size:36px;border-radius:18px;}
  .modal{padding:24px;}
  .hide-m{display:none!important;}
}
@media(max-width:480px){.btn-lg{padding:15px 26px;font-size:14px;}}
</style>
</head>

function calcDISC(answers){
  const s={D:0,I:0,S:0,C:0};
  answers.forEach(a=>{if(a)s[a]++;});
  const total=Object.values(s).reduce((a,b)=>a+b,0)||1;
  const pct={D:Math.round(s.D/total*100),I:Math.round(s.I/total*100),S:Math.round(s.S/total*100),C:Math.round(s.C/total*100)};
  const predominant=Object.entries(s).sort((a,b)=>b[1]-a[1])[0][0];
  return{scores:s,pct,predominant};
}
function genToken(){return Math.random().toString(36).substring(2,10).toUpperCase();}
function fmtDate(d){return new Intl.DateTimeFormat("pt-BR",{day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"}).format(d);}
function fmtDateShort(d){return new Intl.DateTimeFormat("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"}).format(d);}
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="className")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el[k.toLowerCase()]=v;
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}

}
function showToast(msg){
  const t=h("div",{className:"toast"},h("span",{style:{color:"#4ade80",fontSize:"15px"}},"✓"),msg);

}

    pg.appendChild(h("div",{style:{flex:1,display:"flex",alignItems:"center",padding:"36px 24px",background:"#F0EEFF"}},
      h("div",{className:"anim-up",style:{maxWidth:"660px",margin:"0 auto",width:"100%"}},card,hint)
    ));

    return pg;
  }

  function go(dir){
    answers[idx]=sel;
    if(dir>0){
      if(idx<QUESTIONS.length-1){idx++;sel=answers[idx];rebuild();}
      else{
        const{scores,pct,predominant}=calcDISC(answers);
        State.result={user:State.user,scores,pct,predominant,completedAt:new Date(),token:genToken()};
    sendToRDStation(State.user,State.result);
        State.screen="result";render();
      }
    }else{
      if(idx>0){idx--;sel=answers[idx];rebuild();}
    }
  }

  function rebuild(){
    const app=document.getElementById("app");
    app.innerHTML="";
    app.appendChild(buildQuiz());
  }

  return buildQuiz();
}

// ── RD STATION INTEGRATION ──
async function sendToRDStation(user, result){
  const{pct,predominant}=result;
  const p=PROFILES[predominant];
  // Token público RD Station — endpoint /conversions (API pública)
  const RD_PUBLIC_TOKEN="867ab5b832577c037f0b19cd9e4f4331";
  const payload={
    event_type:"CONVERSION",
    event_family:"CDP",
    payload:{
      conversion_identifier:"Avaliacao DISC Trammit",
      email:user.email,
      name:user.name,
      // Campos personalizados (devem existir no RD Station com esses identificadores)
      cf_perfil_disc:p.name,
      cf_perfil_disc_letra:predominant,
      cf_disc_executor:pct.D+"%",
      cf_disc_comunicador:pct.I+"%",
      cf_disc_planejador:pct.S+"%",
      cf_disc_analista:pct.C+"%",
    }
  };
  try{
    const res=await fetch(
      "https://api.rd.services/platform/conversions?api_key="+RD_PUBLIC_TOKEN,
      {
        method:"POST",
        headers:{"Content-Type":"application/json","accept":"application/json"},
        body:JSON.stringify(payload)
      }
    );
    if(res.ok){
      console.log("[RD Station] ✅ Lead enviado:",user.email,"—",p.name);
    } else {
      const txt=await res.text();
      console.warn("[RD Station] ⚠️ Erro "+res.status+":",txt);
    }
  }catch(e){
    console.warn("[RD Station] ⚠️ Falha de rede:",e.message);
  }
}

    overlay.appendChild(h("div",{className:"modal"},
      h("h3",{className:"ff-h",style:{fontWeight:700,fontSize:"17px",marginBottom:"20px"}},"Nova Pergunta"),
      h("div",{className:"input-wrap",style:{marginBottom:"18px"}},h("label",{className:"label-dk"},"Enunciado"),textarea),
      ...optInps.map(x=>x.el),
      h("div",{style:{display:"flex",gap:"10px",marginTop:"20px"}},
        h("button",{className:"btn btn-primary btn-sm",onClick:()=>{
          const newQ={id:Date.now(),text:textarea.value,order:questions.length+1,active:true,options:optInps.map(x=>({text:x.inp.value,disc:x.disc}))};
          questions=[...questions,newQ];
          overlay.remove();rebuildPanel();showToast("Pergunta criada!");
        }},"Criar pergunta"),
        h("button",{className:"btn btn-ghost btn-sm",onClick:()=>overlay.remove()},"Cancelar")
      )
    ));
    document.body.appendChild(overlay);
  }

  return buildPanel();
}

// ── INIT ──
render();
</script>
</body>
